<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Configuración de User Ratings</title>
</head>

<body>
    <div id="UserRatingsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
        data-controller="__plugin/config.js">
        <div data-role="content">
            <div class="content-primary">

                <div class="verticalSection">
                    <h2 class="sectionTitle">Plugin de Valoraciones de Usuario</h2>
                    <p>Este plugin permite a los usuarios valorar y reseñar contenido.</p>
                </div>

                <div class="verticalSection">
                    <h2 class="sectionTitle">Importar / Exportar Reseñas</h2>

                    <!-- EXPORT -->
                    <div class="inputContainer">
                        <p>Descargar todas las reseñas del servidor como JSON o CSV.</p>
                        <div style="display: flex; gap: 10px;">
                            <button id="btnExportRatings" type="button" is="emby-button"
                                class="raised button-submit block" style="width: auto;">
                                <span>⬇ Exportar (JSON)</span>
                            </button>
                            <button id="btnExportRatingsCsv" type="button" is="emby-button"
                                class="raised button-submit block" style="width: auto;">
                                <span>⬇ Exportar (CSV)</span>
                            </button>
                        </div>
                        <div style="margin-top: 10px;">
                            <button id="btnExportHistory" type="button" is="emby-button"
                                class="raised button-submit block" style="width: auto; background-color: #333;">
                                <span>📜 Descargar Historial (CSV)</span>
                            </button>
                        </div>
                    </div>

                    <br />

                    <!-- IMPORT -->
                    <div class="inputContainer">
                        <p>Importar reseñas desde un archivo JSON previamente exportado.</p>
                        <input type="file" id="importFileInput" accept=".json" style="margin-bottom: 8px;" />
                        <button id="btnImportRatings" class="raised button-submit block">
                            <span>⬆ Importar Reseñas</span>
                        </button>
                        <p id="importStatus" style="color: green; display:none;"></p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
